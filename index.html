<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Joshik AI Tic Tac Toe</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>
🤖 Joshik AI Tic-Tac-Toe
</h1>

<p class="subtitle">
Challenge the Unbeatable AI
</p>

<div id="status">
Your Turn (X)
</div>

<div id="board"></div>

<div class="buttons">

<button id="restart">
Restart Game
</button>

</div>

<div class="score">

<div>
Player<br>
<span id="playerScore">0</span>
</div>

<div>
AI<br>
<span id="aiScore">0</span>
</div>

<div>
Draw<br>
<span id="drawScore">0</span>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
